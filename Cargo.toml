[package]
name = "zenscript"
version = "0.1.0"
edition = "2024"

[lib]
name = "zenscript"
path = "src/lib.rs"

[[bin]]
name = "zsc"
path = "src/main.rs"

[dependencies]
anyhow = "1"
ariadne = "0.5"
clap = { version = "4", features = ["derive"] }
notify = "7"
serde = "1.0.228"
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tower-lsp = "0.20.0"

[dev-dependencies]
insta = "1.46.3"
